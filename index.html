<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Удостоверение личности</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f2f2f2;
    }

    header {
      background-color: white;
      padding: 12px 16px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #ddd;
    }

    .tabs {
      display: flex;
      justify-content: center;
      background-color: #f9f9f9;
      border-bottom: 1px solid #ddd;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      color: #666;
    }

    .tab.active {
      border-bottom: 2px solid red;
      color: black;
    }

    .content {
      padding: 16px;
    }

    .photo {
      width: 100%;
      max-width: 350px;
      margin: auto;
      display: block;
      border-radius: 8px;
    }

    .info-label {
      font-weight: bold;
      margin-top: 12px;
    }

    .info-value {
      margin-bottom: 8px;
    }

    .btn {
      display: block;
      width: 90%;
      margin: 12px auto;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background-color: #ec1c24;
      color: white;
    }

    .btn-outline {
      border: 2px solid #ec1c24;
      color: #ec1c24;
      background-color: white;
    }
  </style>
</head>
<body>
  <header>Удостоверение личности</header>
  <div class="tabs">
    <div class="tab active" onclick="showTab('doc')">Документ</div>
    <div class="tab" onclick="showTab('info')">Реквизиты</div>
  </div>

  <div id="doc" class="content">
    <img src="5194971353961327883.jpg" alt="Документ" class="photo" />
    <a href="#" class="btn btn-primary">📱 Предъявить документ</a>
    <a href="#" class="btn btn-outline">📤 Отправить документ</a>
  </div>

  <div id="info" class="content" style="display: none;">
    <div class="info-label">ФИО</div>
    <div class="info-value">Иванова Алия Сергеевна</div>
    <div class="info-label">ИИН</div>
    <div class="info-value">010101123456</div>
    <div class="info-label">Дата рождения</div>
    <div class="info-value">01.01.2001</div>
    <div class="info-label">Номер документа</div>
    <div class="info-value">123456789</div>
    <div class="info-label">Дата выдачи</div>
    <div class="info-value">04.03.2022</div>
    <div class="info-label">Срок действия</div>
    <div class="info-value">03.03.2032</div>
    <a href="#" class="btn btn-outline">📤 Отправить реквизиты</a>
  </div>

  <script>
    function showTab(id) {
      document.getElementById('doc').style.display = id === 'doc' ? 'block' : 'none';
      document.getElementById('info').style.display = id === 'info' ? 'block' : 'none';

      const tabs = document.querySelectorAll('.tab');
      tabs.forEach((tab, idx) => {
        tab.classList.toggle('active', (id === 'doc' && idx === 0) || (id === 'info' && idx === 1));
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(() => {
        console.log("Service Worker registered");
      });
    }
  </script>
</body>
</html>
