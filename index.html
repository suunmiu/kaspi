<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Удостоверение личности</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #000;
      color: #000;
    }

    header {
      background-color: #fff;
      padding: 14px;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
      border-bottom: 1px solid #ddd;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      background-color: #f0f0f0;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      color: #888;
    }

    .tab.active {
      border-bottom: 2px solid #000;
      color: #000;
    }

    .content {
      padding: 0;
      background-color: #e7f2ee;
      min-height: calc(100vh - 140px);
    }

    .photo-container {
      width: 100%;
      height: 520px;
      overflow: hidden;
      touch-action: none;
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: center center;
    }

    .info-label {
      font-weight: bold;
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }

    .info-value {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .btn {
      display: block;
      width: 90%;
      margin: 12px auto;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background-color: #004aad;
      color: white;
    }

    .btn-outline {
      border: 1px solid #004aad;
      color: #004aad;
      background-color: white;
    }

    #info {
      display: none;
      padding: 20px;
      background-color: #fff;
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <header>Удостоверение личности</header>
  <div class="tabs">
    <div class="tab active" onclick="showTab('doc')">Документ</div>
    <div class="tab" onclick="showTab('info')">Реквизиты</div>
  </div>

  <div id="doc" class="content">
    <div class="photo-container">
      <img src="5194971353961328439.jpg" alt="Документ" class="photo" id="zoomable" />
    </div>
    <a href="#" class="btn btn-primary">Предъявить документ</a>
    <a href="#" class="btn btn-outline">Отправить документ</a>
  </div>

  <div id="info" class="content">
    <div>
      <div class="info-label">ФИО</div>
      <div class="info-value">Иванова Алия Сергеевна</div>
      <div class="info-label">ИИН</div>
      <div class="info-value">010101123456</div>
      <div class="info-label">Дата рождения</div>
      <div class="info-value">01.01.2001</div>
      <div class="info-label">Номер документа</div>
      <div class="info-value">123456789</div>
      <div class="info-label">Дата выдачи</div>
      <div class="info-value">04.03.2022</div>
      <div class="info-label">Срок действия</div>
      <div class="info-value">03.03.2032</div>
    </div>
    <a href="#" class="btn btn-outline">Отправить реквизиты</a>
  </div>

  <script>
    function showTab(id) {
      document.getElementById('doc').style.display = id === 'doc' ? 'block' : 'none';
      document.getElementById('info').style.display = id === 'info' ? 'flex' : 'none';

      const tabs = document.querySelectorAll('.tab');
      tabs.forEach((tab, idx) => {
        tab.classList.toggle('active', (id === 'doc' && idx === 0) || (id === 'info' && idx === 1));
      });
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(() => {
        console.log("Service Worker registered");
      });
    }

    // simple zoom handling
    const img = document.getElementById("zoomable");
    let scale = 1;
    let startDist = 0;

    img.addEventListener("touchstart", function (e) {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });

    img.addEventListener("touchmove", function (e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        const newDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const delta = newDist - startDist;
        scale += delta * 0.005;
        scale = Math.max(1, Math.min(scale, 3));
        img.style.transform = `scale(${scale})`;
        startDist = newDist;
      }
    });
  </script>
</body>
</html>
