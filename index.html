<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ec1c24" />
  <title>Kaspi ID</title>
  <link rel="icon" href="kaspi_icon.png" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f2f2f2;
      color: #000;
    }
    .app-bar {
      background-color: #ec1c24;
      color: white;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
    .card {
      background-color: white;
      margin: 12px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .id-photo {
      width: 100px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .id-info {
      margin-left: 16px;
    }
    .row {
      display: flex;
      align-items: center;
    }
    .label {
      font-size: 14px;
      color: #666;
    }
    .value {
      font-size: 16px;
      font-weight: 500;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    .button {
      background-color: #ec1c24;
      color: white;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      margin-top: 16px;
      width: 100%;
      font-size: 16px;
    }
    .requisites {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="app-bar">Kaspi ID</div>

  <div class="card">
    <div class="row">
      <img src="5194971353961327883.jpg" alt="Фото" class="id-photo" />
      <div class="id-info">
        <div class="value">Айгерим Садыкова</div>
        <div class="label">ИИН: 010101010101</div>
        <div class="label">Дата рождения: 01.01.2001</div>
        <div class="label">Гражданство: Казахстан</div>
      </div>
    </div>
    <button class="button" onclick="alert('Показано удостоверение')">Показать удостоверение</button>

    <div class="requisites">
      <div class="section-title">Реквизиты</div>
      <div class="label">Kaspi Gold: 4400 1234 5678 9012</div>
      <div class="label">Kaspi Red: 4400 9876 5432 1098</div>
      <div class="label">Kaspi QR: доступен</div>
      <button class="button" onclick="alert('Реквизиты скопированы')">Скопировать реквизиты</button>
    </div>
  </div>

</body>
</html>
