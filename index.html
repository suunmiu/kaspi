<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Удостоверение личности</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #fff; /* белый фон */
      color: #000;
    }


    header {
      background-color: #fff;
      padding: 14px;
      font-weight: bold;
      text-align: center;
      font-size: 16px;
      border-bottom: 1px solid #ddd;
      position: relative;
    }

    .back-arrow {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      cursor: pointer;
    }

    .tabs {
      position: relative;
      display: flex;
      background: #ecebeb;     /* серый фон */
      border-radius: 10px;
      padding: 3px;
      width: 330px;
      margin: 20px auto;       /* центрируем */
    }

    .tab {
      flex: 1;
      padding: 5px 0;
      text-align: center;
      z-index: 2;              /* вкладки поверх селектора */
      cursor: pointer;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .tab.active {
      color: black;
    }

    .tab-selector {
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(50% - 3px); /* половина ширины контейнера */
      height: calc(100% - 6px);
      background: white;
      border-radius: 7px;
      transition: transform 0.3s ease;
      z-index: 1;
    }


    /* если активна 2-я вкладка */
    .tab:nth-child(2).active ~ ::before {
      left: calc(33.33% + 3px);
    }

    /* если активна 3-я вкладка */
    .tab:nth-child(3).active ~ ::before {
      left: calc(66.66% + 3px);
    }


    .content {
      padding: 0;
      background-color: #fff;
      min-height: calc(100vh - 140px);
    }

    .photo-container {
      width: 100%;
      height: 520px;
      overflow: hidden;
      touch-action: none;
      position: relative;
    }

    .photo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: center center;
    }

    .info-label {
      font-weight: bold;
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }

    .info-value {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .btn {
      display: block;
      width: 90%;
      margin: 12px auto;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      text-align: center;
      text-decoration: none;
    }

    .btn-primary {
      background-color: #0462ef;
      color: white;
    }

    .btn-outline {
      border: 1.5px solid #9abff1;
      color: #0462ef;
      background-color: white;
    }

    #info {
      display: none;
      padding: 20px;
      background-color: #fff;
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <header>
    <div class="back-arrow" onclick="window.history.back()">←</div>
    Удостоверение личности
  </header>
  <div class="tabs">
    <div class="tab-selector" id="selector"></div>
    <div class="tab" onclick="showTab('doc')">Документ</div>
    <div class="tab" onclick="showTab('info')">Реквизиты</div>
  </div>
  


  <div id="doc" class="content">
    <div class="photo-container" id="photoContainer">
      <img src="5194971353961328439.jpg" alt="Документ" class="photo" id="zoomable" />
    </div>
    <a href="#" class="btn btn-primary">Предъявить документ</a>
    <a href="#" class="btn btn-outline">Отправить документ</a>
  </div>

  <div id="info" class="content">
    <div>
      <div class="info-label">ФИО</div>
      <div class="info-value">Югай Софья Владимировна</div>
      <div class="info-label">ИИН</div>
      <div class="info-value">031209601709</div>
      <div class="info-label">Дата рождения</div>
      <div class="info-value">09.12.2003</div>
      <div class="info-label">Номер документа</div>
      <div class="info-value">050260791</div>
      <div class="info-label">Дата выдачи</div>
      <div class="info-value">04.03.2022</div>
      <div class="info-label">Срок действия</div>
      <div class="info-value">03.03.2032</div>
    </div>
    <a href="#" class="btn btn-outline">Отправить реквизиты</a>
  </div>

  <script>
    function showTab(id) {
      document.getElementById('doc').style.display = id === 'doc' ? 'block' : 'none';
      document.getElementById('info').style.display = id === 'info' ? 'flex' : 'none';

      const selector = document.getElementById('selector');
      selector.style.transform = id === 'doc' ? 'translateX(0%)' : 'translateX(100%)';
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').then(() => {
        console.log("Service Worker registered");
      });
    }

    const img = document.getElementById("zoomable");
    const container = document.getElementById("photoContainer");

    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0;
    let lastX = 0, lastY = 0;
    let isDragging = false;

    let startDist = 0;

    container.addEventListener("touchstart", function (e) {
      if (e.touches.length === 2) {
        startDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        lastScale = scale;
      } else if (e.touches.length === 1) {
        isDragging = true;
        lastX = e.touches[0].clientX - posX;
        lastY = e.touches[0].clientY - posY;
      }
    });

    container.addEventListener("touchmove", function (e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        const newDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        scale = Math.min(3, Math.max(1, lastScale * (newDist / startDist)));
        img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
      } else if (e.touches.length === 1 && isDragging) {
        e.preventDefault();
        posX = e.touches[0].clientX - lastX;
        posY = e.touches[0].clientY - lastY;
        img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
      }
    });

    container.addEventListener("touchend", function (e) {
      if (e.touches.length < 2) {
        isDragging = false;
      }
    });
  </script>
</body>
</html>
