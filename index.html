<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Удостоверение личности</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto&display=swap">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background: #fff;
      color: #000;
    }
    .header {
      display: flex;
      align-items: center;
      padding: 16px;
      font-weight: bold;
      font-size: 18px;
      border-bottom: 1px solid #ccc;
    }
    .tabs {
      display: flex;
      justify-content: space-around;
      border-bottom: 1px solid #ccc;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      cursor: pointer;
      font-weight: 500;
    }
    .tab.active {
      border-bottom: 2px solid #000;
    }
    .content {
      padding: 20px;
    }
    .document-image {
      width: 100%;
      border-radius: 12px;
      max-height: 500px;
      object-fit: contain;
    }
    .info {
      margin-bottom: 10px;
    }
    .label {
      font-size: 14px;
      color: #777;
    }
    .value {
      font-size: 16px;
      margin-bottom: 6px;
    }
    .copy-button {
      float: right;
      opacity: 0.5;
      cursor: pointer;
    }
    .buttons {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #fff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
    }
    .btn {
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background-color: #2b68f8;
      color: white;
    }
    .btn-outline {
      background: none;
      border: 1px solid #2b68f8;
      color: #2b68f8;
    }
  </style>
</head>
<body>
  <div class="header">Удостоверение личности</div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('document')">Документ</div>
    <div class="tab" onclick="showTab('details')">Реквизиты</div>
  </div>

  <div class="content" id="document-tab">
    <img src="5194971353961327883.jpg" alt="Документ" class="document-image" />
  </div>

  <div class="content" id="details-tab" style="display: none;">
    <div class="info"><span class="label">ФИО:</span> <span class="value">Иванова Алина Сергеевна</span> <span class="copy-button">📋</span></div>
    <div class="info"><span class="label">ИИН:</span> <span class="value">010101500000</span> <span class="copy-button">📋</span></div>
    <div class="info"><span class="label">Дата рождения:</span> <span class="value">01.01.2001</span> <span class="copy-button">📋</span></div>
    <div class="info"><span class="label">Номер документа:</span> <span class="value">123456789</span> <span class="copy-button">📋</span></div>
    <div class="info"><span class="label">Дата выдачи:</span> <span class="value">04.03.2022</span></div>
    <div class="info"><span class="label">Срок действия:</span> <span class="value">03.03.2032</span></div>
  </div>

  <div class="buttons">
    <button class="btn btn-primary" onclick="alert('Документ предъявлен')">📷 Предъявить документ</button>
    <button class="btn btn-outline" onclick="alert('Документ отправлен')">📤 Отправить документ</button>
    <button class="btn btn-outline" onclick="alert('Реквизиты отправлены')">📤 Отправить реквизиты</button>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('document-tab').style.display = tab === 'document' ? 'block' : 'none';
      document.getElementById('details-tab').style.display = tab === 'details' ? 'block' : 'none';
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(el => el.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${tab === 'document' ? 1 : 2})`).classList.add('active');
    }
  </script>
</body>
</html>
